services:
  - type: web
    name: flexilearn
    runtime: node
    plan: free
    buildCommand: npm ci --prefix backend && npm ci --prefix frontend && npm run build --prefix frontend && npm run build --prefix backend
    startCommand: npm run prisma:deploy --prefix backend && npm run start --prefix backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: flexilearn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: PASSWORD_RESET_CODE_TTL_MINUTES
        value: 15
      - key: PASSWORD_RESET_MAX_ATTEMPTS
        value: 5
      - key: PASSWORD_RESET_TOKEN_EXPIRES_IN
        value: 15m
      - key: AUTH_MAX_FAILED_LOGINS
        value: 5
      - key: AUTH_LOCKOUT_MINUTES
        value: 15
      - key: PLATFORM_COMMISSION_RATE
        value: 10
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_DIR
        value: uploads
      - key: FRONTEND_DIST_DIR
        value: /opt/render/project/src/frontend/dist

databases:
  - name: flexilearn-db
    plan: free
    databaseName: flexilearn
    user: flexilearn
